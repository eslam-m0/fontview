<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontview</title>
    <!-- ربط ملف الـ PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <header>
        <div class="logo">Fontview</div>
        <div class="header-controls">
            <button id="langToggle" class="btn-icon">عربي</button>
            <button id="themeToggle" class="btn-icon">☀️</button>
        </div>
    </header>

    <main>
        <div class="controls-panel">
            <div class="toolbar-top">
                <div class="file-upload-wrapper">
                    <label for="fontInput" id="btnFolder" class="btn-primary">Select Font Folder</label>
                    <input type="file" id="fontInput" webkitdirectory directory multiple accept=".ttf,.otf,.woff,.woff2">
                    <span id="fileCount" class="file-count">0 files selected</span>
                </div>
                <div class="top-actions">
                    <!-- زر تصدير المفضلة (مخفي افتراضياً) -->
                    <button id="exportFavBtn" class="btn-outline" style="display: none;">📥 Export Favs</button>
                    <button id="clearBtn" class="btn-outline">Clear All</button>
                </div>
            </div>

            <!-- تبويبات المفضلة -->
            <div class="tabs-container">
                <button class="tab-btn active" data-tab="all" id="tabAll">All Fonts</button>
                <button class="tab-btn" data-tab="fav" id="tabFav">Favorites ⭐</button>
            </div>

            <div class="toolbar-middle" style="display: flex; flex-wrap: wrap; gap: 15px; width: 100%; margin: 20px 0;">
                <div class="input-group" style="flex: 2; min-width: 250px;">
                    <label id="lblText">Preview Text:</label>
                    <input type="text" id="previewText" value="" placeholder="Type something to preview...">
                </div>
                
                <div class="input-group" style="flex: 1; min-width: 150px;">
                    <label id="lblSearch">Search Fonts:</label>
                    <input type="text" id="searchFont" placeholder="Search by name...">
                </div>

                <!-- أدوات اختيار الألوان -->
                <div class="input-group color-pickers" style="flex: 1; min-width: 150px; flex-direction: row; align-items: flex-end; gap: 10px;">
                    <div>
                        <label id="lblTextColor" style="display: block; font-size: 0.8rem; margin-bottom: 5px;">Text Color</label>
                        <input type="color" id="textColorPicker" value="#ffffff">
                    </div>
                    <div>
                        <label id="lblBgColor" style="display: block; font-size: 0.8rem; margin-bottom: 5px;">Bg Color</label>
                        <input type="color" id="bgColorPicker" value="#1e1e1e">
                    </div>
                </div>
            </div>

            <div class="toolbar-bottom" style="display: flex; flex-wrap: wrap; gap: 15px;">
                <div class="slider-group">
                    <label id="lblSize">Size:</label>
                    <input type="range" id="fontSizeSlider" min="16" max="100" value="40">
                    <span id="fontSizeDisplay">40px</span>
                </div>
                <!-- أدوات المسافات -->
                <div class="slider-group">
                    <label id="lblSpacing">Spacing:</label>
                    <input type="range" id="letterSpacingSlider" min="-5" max="20" value="0">
                </div>
                <div class="slider-group">
                    <label id="lblLineHeight">Line H:</label>
                    <input type="range" id="lineHeightSlider" min="0.5" max="3" step="0.1" value="1.2">
                </div>

                <div class="alignment-group" style="margin-left: auto;">
                    <button class="align-btn active" data-align="left">⬅</button>
                    <button class="align-btn" data-align="center">↔</button>
                    <button class="align-btn" data-align="right">➡</button>
                </div>
            </div>
        </div>

        <div id="fontContainer" class="font-grid">
            <!-- سيتم إضافة بطاقات الخطوط هنا -->
        </div>
        
        <div id="loadingObserver" style="height: 20px; text-align: center; color: var(--text-secondary); margin-top: 10px;"></div>
    </main>

    <footer>
        <p>Created by</p>
        <a href="https://linktr.ee/Eslam.mo" target="_blank" class="footer-link">
            <img src="logo.png" alt="Eslam Logo" class="footer-logo">
        </a>
        <!-- النصوص الجديدة المطلوبة -->
        <p class="footer-msg">اتمني لكم التوفيق</p>
        <p class="footer-rights">جميع الحقوق محفوظة - 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
