<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontview</title>
    <!-- ربط ملف الـ PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K836XD71H5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-K836XD71H5');
    </script>
</head>
<body data-theme="dark">

    <!-- حاوية عائمة أعلى الشاشة تضم الهيدر ولوحة التحكم -->
    <div class="sticky-top-wrapper">
        <header>
            <div class="logo">Fontview</div>
            <div class="header-controls">
                <button id="installAppBtn" class="btn-primary" style="display: none; background-color: #ff3b30; margin-right: 15px; padding: 5px 10px;">تثبيت التطبيق 📱</button>
                <button id="openFavBtn" class="btn-outline">⭐ Favorites</button>
                <button id="langToggle" class="btn-icon">عربي</button>
                <button id="themeToggle" class="btn-icon">☀️</button>
            </div>
        </header>

        <div class="controls-panel">
            <div class="toolbar-top">
                <div class="file-upload-wrapper">
                    <label for="fontInput" id="btnFolder" class="btn-primary">Select Font Folder</label>
                    <input type="file" id="fontInput" webkitdirectory directory multiple accept=".ttf,.otf,.woff,.woff2">
                    <span id="fileCount" class="file-count">0 files selected</span>
                </div>
                <button id="clearBtn" class="btn-outline">Clear All</button>
            </div>

            <div class="toolbar-middle">
                <div class="input-group" style="flex: 2;">
                    <label id="lblText">Preview Text:</label>
                    <input type="text" id="previewText" value="" placeholder="Type something to preview...">
                </div>
                
                <div class="input-group" style="flex: 1;">
                    <label id="lblSearch">Search Fonts:</label>
                    <input type="text" id="searchFont" placeholder="Search by name...">
                </div>

                <div class="input-group color-pickers" style="flex-direction: row; gap: 10px;">
                    <div>
                        <label id="lblTextColor">Text</label>
                        <input type="color" id="textColorPicker" value="#ffffff">
                    </div>
                    <div>
                        <label id="lblBgColor">Bg</label>
                        <input type="color" id="bgColorPicker" value="#1e1e1e">
                    </div>
                </div>
            </div>

            <div class="toolbar-bottom">
                <div class="slider-group">
                    <label id="lblSize">Size:</label>
                    <input type="range" id="fontSizeSlider" min="16" max="100" value="40">
                    <span id="fontSizeDisplay">40px</span>
                </div>
                <div class="slider-group">
                    <label id="lblSpacing">Space:</label>
                    <input type="range" id="letterSpacingSlider" min="-5" max="20" value="0">
                </div>
                <div class="slider-group">
                    <label id="lblLineHeight">Line:</label>
                    <input type="range" id="lineHeightSlider" min="0.5" max="3" step="0.1" value="1.2">
                </div>

                <div class="alignment-group">
                    <button class="align-btn active" data-align="left">⬅</button>
                    <button class="align-btn" data-align="center">↔</button>
                    <button class="align-btn" data-align="right">➡</button>
                </div>
            </div>
        </div>
    </div>

    <!-- شبكة الخطوط -->
    <main>
        <div id="fontContainer" class="font-grid"></div>
        <div id="loadingObserver" style="height: 20px; text-align: center; color: var(--text-secondary); margin-top: 10px;"></div>
    </main>

    <!-- القائمة الجانبية للمفضلة -->
    <div id="favSidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 id="lblSidebarTitle">Favorites ⭐</h2>
            <button id="closeFavBtn" class="close-sidebar">✖</button>
        </div>
        <button id="exportFavBtn" class="btn-primary" style="margin-bottom: 15px; width: 100%;">📥 Export Favs</button>
        <div id="favList" class="fav-list">
            <!-- ستظهر الخطوط المفضلة هنا -->
        </div>
    </div>

    <!-- التذييل العائم -->
    <footer>
        <p class="footer-msg">اتمني لكم التوفيق</p>
        <p class="footer-rights">جميع الحقوق محفوظة - 2026</p>
        <a href="https://linktr.ee/Eslam.mo" target="_blank" class="footer-link">
            <img src="logo.png" alt="Eslam Logo" class="footer-logo">
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
